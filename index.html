<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热泵空调一体机参数对比</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-center text-blue-800 mb-8">热泵空调一体机参数对比</h1>
    
    <div id="loading" class="text-center text-gray-700 text-xl mb-6">正在加载数据，请稍候...</div>
    
    <div class="overflow-x-auto rounded-xl shadow-lg bg-white">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-blue-600 text-white">
          <tr id="headers"></tr>
        </thead>
        <tbody id="rows" class="divide-y divide-gray-200 bg-white"></tbody>
      </table>
    </div>
  </div>

  <script>
    // 用 allorigins.win 代理（更稳定）
    const CSV_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://docs.google.com/spreadsheets/d/1sgKLZvTfmAfTzYzDlzmRzQrpmD9j1mom4pcylwknJN8/pub?output=csv');

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        const data = results.data.filter(row => row['型号'] && row['型号'].trim() !== '');

        if (data.length === 0) {
          document.getElementById('rows').innerHTML = '<tr><td colspan="20" class="text-center text-red-600 py-10 font-bold">暂无数据或加载失败，请检查 Sheets 是否有内容</td></tr>';
          return;
        }

        const headers = Object.keys(data[0]);
        const thead = document.getElementById('headers');
        headers.forEach(header => {
          const th = document.createElement('th');
          th.className = 'px-6 py-3 text-left text-xs uppercase tracking-wider';
          th.textContent = header;
          thead.appendChild(th);
        });

        const tbody = document.getElementById('rows');
        data.forEach(row => {
          const tr = document.createElement('tr');
          headers.forEach(header => {
            const td = document.createElement('td');
            td.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-900';
            td.textContent = row[header] || '-';
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      },
      error: function(error) {
        document.getElementById('loading').innerHTML = '<p class="text-red-600 text-center py-10 font-bold">加载失败：' + error.message + '<br>请刷新页面或检查网络/代理</p>';
        console.error('PapaParse Error:', error);
      }
    });
  </script>
</body>
</html>
