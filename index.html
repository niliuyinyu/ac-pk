<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热泵空调一体机参数对比</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f9fafb; color: #1f2937; margin: 0; padding: 0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 2.5rem; font-weight: bold; text-align: center; color: #1d4ed8; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #d1d5db; padding: 0.75rem; text-align: left; }
    th { background: #3b82f6; color: white; font-weight: bold; }
    tr:nth-child(even) { background: #f3f4f6; }
    #loading { text-align: center; font-size: 1.2rem; color: #6b7280; margin: 2rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>热泵空调一体机参数对比</h1>
    
    <div id="loading">正在加载数据，请稍候...</div>
    <div class="overflow-x-auto">
      <table id="compare-table">
        <thead><tr id="headers"></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    // 用代理绕 CORS（corsproxy.io 免费，测试用；后期可换 Workers 代理）
    const CSV_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/1sgKLZvTfmAfTzYzDlzmRzQrpmD9j1mom4pcylwknJN8/pub?output=csv');

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        const data = results.data.filter(row => row['型号'] && row['型号'].trim() !== '');
        
        if (data.length === 0) {
          document.getElementById('rows').innerHTML = '<tr><td colspan="20" class="text-center text-red-600 py-4">暂无数据或加载失败</td></tr>';
          return;
        }

        const headers = Object.keys(data[0]);
        const thead = document.getElementById('headers');
        headers.forEach(header => {
          const th = document.createElement('th');
          th.textContent = header;
          thead.appendChild(th);
        });

        const tbody = document.getElementById('rows');
        data.forEach(row => {
          const tr = document.createElement('tr');
          headers.forEach(header => {
            const td = document.createElement('td');
            td.textContent = row[header] || '-';
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      },
      error: function(error) {
        document.getElementById('loading').innerHTML = '<p class="text-red-600 text-center py-4">加载失败：' + error.message + '<br>请检查网络或代理</p>';
        console.error('PapaParse Error:', error);
      }
    });
  </script>
</body>
</html>
